server {
    listen 80;

    # Serve static files
    root /usr/share/nginx/html;
    index index.html;

    # Proxy ADS-B API — avoids CORS/rate-limit on browser Origin header
    location /api/adsb/ {
        proxy_pass https://api.airplanes.live/v2/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.airplanes.live;
        proxy_set_header X-Real-IP $remote_addr;
        # Strip browser Origin so the upstream never sees localhost:8080
        proxy_set_header Origin "";
        proxy_set_header Referer "";
        # Add CORS headers for the browser's request to our proxy
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-store";
    }

    # Suppress noise for missing source maps (vendor JS assets)
    location ~* \.js\.map$ {
        add_header Content-Type application/json;
        return 200 '{}';
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
