<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL OS</title>
    <!-- Favicon — ICO (Safari + legacy, always checked at root) -->
    <link rel="shortcut icon" href="/favicon.ico">
    <!-- Favicon — modern browsers (SVG, scales to any size) -->
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <!-- Favicon — PNG fallbacks -->
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png">
    <!-- Apple touch icon — iOS / iPadOS / macOS dock (precomposed prevents iOS gloss) -->
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/assets/apple-touch-icon.png">
    <!-- Android / PWA theme colour -->
    <meta name="theme-color" content="#000000">
    <link href='/assets/maplibre-gl.css' rel='stylesheet' />
    <link href='https://fonts.googleapis.com/css2?family=Barlow:wght@100;300;400;500;600;700;900&family=Barlow+Condensed:wght@400;500;600;700;900&display=swap' rel='stylesheet' />
    <link rel="stylesheet" href="/frontend/components/shared/map/map.css">
    <link rel="stylesheet" href="/frontend/assets/template.css">
    <link rel="stylesheet" href="/frontend/components/shared/user-location/user-location.css">
    <link rel="stylesheet" href="/frontend/components/shared/notifications/notifications.css">
    <link rel="stylesheet" href="/frontend/components/shared/tracking/tracking.css">
    <link rel="stylesheet" href="/frontend/components/shared/settings/settings.css">
    <link rel="stylesheet" href="/frontend/components/docs/docs.css">
    {% block head %}{% endblock %}
</head>

<body data-domain="{{ domain }}">
    <header id="nav">
        <div id="nav-logo">
            <img id="logo-img" src="/frontend/assets/logo.svg" alt="SENTINEL OS">
        </div>
        <nav id="nav-right">
            <a href="/air/" class="nav-link{% if domain == 'air' %} nav-link--active{% endif %}" data-domain="air">AIR</a>
            <a href="/space/" class="nav-link{% if domain == 'space' %} nav-link--active{% endif %}" data-domain="space">SPACE</a>
            <a href="/sea/" class="nav-link{% if domain == 'sea' %} nav-link--active{% endif %}" data-domain="sea">SEA</a>
            <a href="/land/" class="nav-link{% if domain == 'land' %} nav-link--active{% endif %}" data-domain="land">LAND</a>
            <a href="/sdr/" class="nav-link{% if domain == 'sdr' %} nav-link--active{% endif %}" data-domain="sdr">SDR</a>
        </nav>
    </header>

    {% block content %}{% endblock %}

    <div id="notifications-panel">
        <div id="notif-header">
            <button id="notif-clear-all-btn" aria-label="Clear notifications">CLEAR</button>
            <div id="notif-scroll-hint">MORE <svg id="notif-scroll-arrow" width="8" height="8" viewBox="0 0 8 8" fill="none" xmlns="http://www.w3.org/2000/svg"><polyline points="1,2.5 4,5.5 7,2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </div>
        <div id="notif-list-wrap">
            <div id="notif-list"></div>
        </div>
    </div>

    <div id="tracking-panel">
        <div id="adsb-status-bar"></div>
    </div>

    <!-- ── Docs panel (overlay, same layer as settings) ────────────────────── -->
    <div id="docs-panel">

        <!-- Sidebar -->
        <div id="docs-sidebar">
            <nav id="docs-nav">
                <a href="#overview"       class="docs-nav-item active">Overview</a>
                <a href="#architecture"   class="docs-nav-item">Architecture</a>
                <a href="#domains"        class="docs-nav-item">Domains</a>
                <a href="#api"            class="docs-nav-item">API Reference</a>
                <a href="#settings-guide" class="docs-nav-item">Settings</a>
                <a href="#configuration"  class="docs-nav-item">Configuration</a>
                <a href="#deployment"     class="docs-nav-item">Deployment</a>
            </nav>
        </div>

        <!-- Content -->
        <div id="docs-content">
            <div id="docs-body">
                {% include "docs/content.html" %}
            </div>
        </div>
    </div>

    <footer id="footer">
        <div id="footer-left">
            <button id="notif-toggle-btn" aria-label="Toggle notifications" data-tooltip="NOTIFICATIONS">
                <svg id="notif-icon" width="17" height="17" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M6.5 1C4.015 1 2 3.015 2 5.5V9H1v1h11V9h-1V5.5C11 3.015 8.985 1 6.5 1Z" fill="currentColor" fill-opacity="1"/>
                    <path d="M5 10.5a1.5 1.5 0 0 0 3 0" stroke="currentColor" stroke-width="1" fill="none"/>
                </svg>
                <span id="notif-count"></span>
            </button>
            <button id="tracking-toggle-btn" aria-label="Toggle tracking" data-tooltip="TRACKING">
                <svg id="tracking-icon" width="17" height="17" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.4"/>
                    <circle cx="6.5" cy="6.5" r="2" fill="currentColor"/>
                    <line x1="6.5" y1="1" x2="6.5" y2="2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="square"/>
                    <line x1="6.5" y1="10.5" x2="6.5" y2="12" stroke="currentColor" stroke-width="1.4" stroke-linecap="square"/>
                    <line x1="1" y1="6.5" x2="2.5" y2="6.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="square"/>
                    <line x1="10.5" y1="6.5" x2="12" y2="6.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="square"/>
                </svg>
                <span id="tracking-count"></span>
            </button>
        </div>
        <div id="footer-right">
            <button id="docs-btn" aria-label="Documentation" data-tooltip="DOCUMENTATION">
                <svg width="17" height="17" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <rect x="2.5" y="1.5" width="10" height="12" rx="1" stroke="currentColor" stroke-width="1.1"/>
                    <line x1="5" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
                    <line x1="5" y1="7.5" x2="10" y2="7.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
                    <line x1="5" y1="10" x2="8" y2="10" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
                </svg>
            </button>
            <button id="settings-btn" aria-label="Settings" data-tooltip="SETTINGS">
                <svg width="18" height="18" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M6.18 1.5h2.64l.38 1.52a5 5 0 0 1 1.1.64l1.5-.5 1.32 2.28-1.16 1.03a5.06 5.06 0 0 1 0 1.26l1.16 1.03-1.32 2.28-1.5-.5a5 5 0 0 1-1.1.64l-.38 1.52H6.18l-.38-1.52a5 5 0 0 1-1.1-.64l-1.5.5L1.88 9.26l1.16-1.03a5.06 5.06 0 0 1 0-1.26L1.88 5.94 3.2 3.66l1.5.5a5 5 0 0 1 1.1-.64L6.18 1.5Z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
                    <circle cx="7.5" cy="7.5" r="1.75" stroke="currentColor" stroke-width="1.1"/>
                </svg>
            </button>
        </div>
    </footer>

    <!-- Mermaid diagrams -->
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
        const mermaidConfig = {
            startOnLoad: false,
            theme: 'base',
            themeVariables: {
                background: '#38435c',
                primaryColor: '#2a3247',
                primaryTextColor: '#ffffff',
                primaryBorderColor: '#c8ff00',
                lineColor: '#c8ff00',
                secondaryColor: '#1e2638',
                tertiaryColor: '#38435c',
                edgeLabelBackground: '#38435c',
                clusterBkg: '#1e2638',
                clusterBorder: 'rgba(255,255,255,0.12)',
                titleColor: '#c8ff00',
                fontFamily: 'Barlow, sans-serif',
                fontSize: '13px',
                nodeBorder: 'rgba(255,255,255,0.15)',
                nodeTextColor: 'rgba(255,255,255,0.85)',
                labelTextColor: 'rgba(255,255,255,0.85)',
                attributeBackgroundColorEven: '#2a3247',
                attributeBackgroundColorOdd: '#1e2638',
            },
            flowchart: { curve: 'basis', padding: 20 },
            sequence: { actorFontFamily: 'Barlow, sans-serif', noteFontFamily: 'Barlow, sans-serif' },
        };
        mermaid.initialize(mermaidConfig);
        // Expose run function for the docs panel toggle
        window.__mermaidRun = () => mermaid.run({ querySelector: '#docs-body .mermaid' });
    </script>

    <!-- Core libraries -->
    <script src="/assets/pmtiles.js"></script>
    <script src='/assets/maplibre-gl.js'></script>

    <!-- Shared components -->
    <script src="/frontend/components/shared/settings/settings-api.js"></script>
    <script src="/frontend/components/shared/notifications/notifications.js"></script>
    <script src="/frontend/components/shared/tracking/tracking.js"></script>
    <script src="/frontend/components/shared/settings/settings.js"></script>
    <script src="/frontend/components/shared/settings/settings-init.js"></script>
    <script src="/frontend/components/docs/docs.js"></script>
    <script>
    (function () {
        "use strict";
        document.addEventListener('DOMContentLoaded', function () {
            var btn = document.getElementById('docs-btn');
            var panel = document.getElementById('docs-panel');
            if (!btn || !panel) return;
            var mermaidRendered = false;
            btn.addEventListener('click', function () {
                var isOpen = panel.classList.toggle('docs-panel-visible');
                btn.classList.toggle('docs-btn-active', isOpen);
                if (isOpen && !mermaidRendered && typeof window.__mermaidRun === 'function') {
                    mermaidRendered = true;
                    // Small delay to ensure panel is visible before rendering
                    setTimeout(window.__mermaidRun, 50);
                }
            });
        });
    })();
    </script>

    <!-- Map component -->
    <script src="/frontend/components/shared/map/map.js"></script>

    {% block scripts %}{% endblock %}
</body>

</html>
